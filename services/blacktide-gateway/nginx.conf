log_format blacktide_json escape=json
    '{"ts":"$time_iso8601","ip":"$remote_addr","method":"$request_method","uri":"$request_uri","status":$status,"ua":"$http_user_agent","ref":"$http_referer","trace":"BT-AUTH-4421","profile":"legacy-mirror"}';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/blacktide.log blacktide_json;

    add_header X-BT-Trace "BT-AUTH-4421" always;
    add_header X-BT-Profile "legacy-mirror" always;
    add_header X-BT-Surface "partner-gateway" always;

    location / {
        proxy_pass http://blacktide_vuln:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required so sub_filter can modify response body.
        proxy_set_header Accept-Encoding "";
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter "<body>" "<body><div style='background:#0d1117;color:#e6edf3;border-bottom:1px solid #30363d;padding:10px 14px;font:14px/1.4 Arial,sans-serif;'><strong>Black Tide Partner Portal</strong> - Restricted Access - Authorized Operators Only</div>";
    }
}
